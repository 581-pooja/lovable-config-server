server:
  port: 9030
  servlet.context-path: /intelligence

spring:
  datasource:
    url: jdbc:postgresql://localhost:9010/lovable-intelligence-db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  ai:
    model.chat: openai
    openai:
      api-key: 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
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: mistralai/mistral-7b-instruct:free
          temperature: 0.2
      embedding:
        options:
          model: qwen/qwen3-embedding-8b

---

spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://pgvector.lovable-core.svc.cluster.local:5432/intelligence_db
    username: intelligence_user
    password: ${DB_PASSWORD}

ai:
    openai:
      api-key: ${AI_API_KEY}
    chat:
        options:
          model: google/gemini-3-flash-preview
